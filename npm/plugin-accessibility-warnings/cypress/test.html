<body>
  <h1>DIVs with click handlers are not buttons</h1>
  <div onclick="document.querySelector('output').innerText='The click happened'">
    Click Me!
  </div>
  <output></output>
  <a>I'm a bad link</a>
  <a href="#">I'm probably also a bad link</a>
  <a href="https://example.cypress.io/">I'm a fine link</a>
</body>
